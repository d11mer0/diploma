server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Для React Router: якщо файл не знайдено, завжди віддавати index.html
        try_files $uri $uri/ /index.html;
    }

    # Кешування статики
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|svg|ttf|otf|woff)$ {
        root   /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
